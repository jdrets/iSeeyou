services:
  # ─────────────────────────────────────────────
  # ClickHouse — ingesta y queries analíticas
  # ─────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: iseeyou_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface (queries desde dashboard / Go client)
      - "9000:9000"   # Native TCP interface (driver nativo de alto rendimiento)
    environment:
      CLICKHOUSE_DB: iseeyou
      CLICKHOUSE_USER: iseeyou
      CLICKHOUSE_PASSWORD: iseeyou_secret
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./infra/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./infra/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # PostgreSQL — datos transaccionales del dashboard
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: iseeyou_postgres
    restart: unless-stopped
    ports:
      # Host 5433 avoids conflict with local work Postgres on 5432
      - "5433:5432"
    environment:
      POSTGRES_DB: iseeyou
      POSTGRES_USER: iseeyou
      POSTGRES_PASSWORD: iseeyou_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iseeyou -d iseeyou"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # ingest-api — microservicio Go de ingesta
  # ─────────────────────────────────────────────
  ingest-api:
    build:
      context: ./apps/ingest-api
      dockerfile: Dockerfile
    container_name: iseeyou_ingest_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      CLICKHOUSE_ADDR: "clickhouse:9000"
      CLICKHOUSE_DB: iseeyou
      CLICKHOUSE_USER: iseeyou
      CLICKHOUSE_PASSWORD: iseeyou_secret
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: iseeyou_network
